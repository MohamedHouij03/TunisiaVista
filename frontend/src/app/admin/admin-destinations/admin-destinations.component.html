<div class="admin-content">
  <!-- Topbar -->
  <div class="admin-topbar">
    <div class="d-flex align-items-center gap-3">
      <a routerLink="/admin/dashboard" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
      <h5 class="mb-0" style="font-family:var(--font-heading);color:var(--clr-navy);">Destinations</h5>
    </div>
    <button class="btn btn-primary btn-sm" (click)="openNew()"><i class="bi bi-plus-lg me-1"></i>Add Destination</button>
  </div>

  <div class="p-4">
    <!-- Success -->
    <div *ngIf="successMsg" class="alert alert-success alert-dismissible mb-4" style="border-radius:var(--radius-md);">
      <i class="bi bi-check-circle me-2"></i>{{successMsg}}
      <button type="button" class="btn-close" (click)="successMsg=''"></button>
    </div>

    <!-- Delete Confirm Modal -->
    <div *ngIf="deleteConfirm" class="modal-backdrop-custom">
      <div class="modal-dialog-custom">
        <div class="modal-icon mb-3"><i class="bi bi-exclamation-triangle text-danger" style="font-size:2.5rem;"></i></div>
        <h5 style="font-family:var(--font-heading);">Delete Destination?</h5>
        <p style="color:var(--clr-text-muted);font-size:.9rem;">This action cannot be undone.</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button class="btn btn-outline-secondary" (click)="cancelDelete()">Cancel</button>
          <button class="btn btn-danger" (click)="doDelete()">Delete</button>
        </div>
      </div>
    </div>

    <!-- Form Panel -->
    <div *ngIf="showForm" class="card mb-4" style="border-radius:var(--radius-lg);border-left:4px solid var(--clr-primary);">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h6 class="mb-0" style="font-family:var(--font-heading);font-size:1.1rem;">{{editing ? 'Edit' : 'New'}} Destination</h6>
          <button class="btn btn-sm btn-outline-secondary" (click)="closeForm()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control" [(ngModel)]="form.name" placeholder="e.g. Tunis">
          </div>
          <div class="col-md-6">
            <label class="form-label">Region *</label>
            <select class="form-select" [(ngModel)]="form.region">
              <option *ngFor="let r of regions" [value]="r">{{r}}</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Short Description</label>
            <input type="text" class="form-control" [(ngModel)]="form.shortDesc" placeholder="One-line teaser (max 120 chars)">
          </div>
          <div class="col-12">
            <label class="form-label">Full Description</label>
            <textarea class="form-control" rows="4" [(ngModel)]="form.description" placeholder="Full destination description..."></textarea>
          </div>
          <div class="col-md-8">
            <label class="form-label">Cover Image URL</label>
            <input type="url" class="form-control" [(ngModel)]="form.coverImage" placeholder="https://images.unsplash.com/...">
          </div>
          <div class="col-md-4">
            <label class="form-label">Best Season</label>
            <input type="text" class="form-control" [(ngModel)]="form.bestSeason" placeholder="e.g. Apr–Oct">
          </div>
          <div class="col-12">
            <label class="form-label">Tags <span style="color:var(--clr-text-muted);font-weight:400;">(comma-separated)</span></label>
            <input type="text" class="form-control" [(ngModel)]="form.tags" placeholder="beach, culture, history">
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" (click)="save()" [disabled]="saving || !form.name">
              <span *ngIf="!saving"><i class="bi bi-save me-1"></i>{{editing ? 'Update' : 'Create'}} Destination</span>
              <span *ngIf="saving"><span class="spinner-border spinner-border-sm me-2"></span>Saving...</span>
            </button>
            <button class="btn btn-outline-secondary" (click)="closeForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="data-table">
      <div class="d-flex justify-content-between align-items-center p-3" style="border-bottom:1px solid var(--clr-border);">
        <h6 class="mb-0" style="font-weight:700;">All Destinations <span class="badge bg-primary ms-2">{{destinations.length}}</span></h6>
      </div>
      <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <div class="table-responsive" *ngIf="!loading">
        <table class="table mb-0">
          <thead>
            <tr>
              <th>DESTINATION</th>
              <th>REGION</th>
              <th>TAGS</th>
              <th>BEST SEASON</th>
              <th class="text-end">ACTIONS</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of destinations">
              <td>
                <div class="d-flex align-items-center gap-3">
                  <img *ngIf="d.coverImage" [src]="d.coverImage" style="width:48px;height:36px;object-fit:cover;border-radius:6px;" loading="lazy" onerror="this.style.display='none'">
                  <div>
                    <div style="font-weight:600;color:var(--clr-navy);">{{d.name}}</div>
                    <div style="font-size:.75rem;color:var(--clr-text-muted);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{d.shortDesc}}</div>
                  </div>
                </div>
              </td>
              <td><span class="badge-region">{{d.region}}</span></td>
              <td>
                <div class="d-flex flex-wrap gap-1">
                  <span *ngFor="let tag of (d.tags || []).slice(0,3)" style="background:var(--clr-off-white);padding:.15rem .5rem;border-radius:4px;font-size:.7rem;">{{tag}}</span>
                </div>
              </td>
              <td style="font-size:.82rem;color:var(--clr-text-muted);">{{d.bestSeason || 'N/A'}}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-primary me-1" (click)="openEdit(d)"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(d._id || d.id)"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
