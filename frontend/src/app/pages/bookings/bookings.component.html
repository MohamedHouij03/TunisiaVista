<div class="page-header"><div class="container"><h1 class="page-header-title">My Bookings</h1></div></div>
<div class="container py-5">
  <div *ngIf="loading" class="loading-screen"><div class="spinner-border"></div></div>
  <div *ngIf="!loading && bookings.length === 0" class="text-center py-5">
    <i class="bi bi-suitcase" style="font-size:3rem;color:var(--clr-text-light);"></i>
    <h4 class="mt-3" style="color:var(--clr-navy);">No bookings yet</h4>
    <a routerLink="/tours" class="btn btn-primary mt-3">Browse Tours</a>
  </div>
  <div class="row g-4" *ngIf="!loading && bookings.length > 0">
    <div class="col-lg-6" *ngFor="let b of bookings">
      <div class="card p-4" style="border-radius:var(--radius-lg);">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <h5 style="font-family:var(--font-heading);color:var(--clr-navy);">{{b.tour?.name || 'Tour Booking'}}</h5>
          <span style="font-size:.7rem;font-weight:700;padding:.25rem .75rem;border-radius:50px;text-transform:uppercase;" [style.background]="b.status==='confirmed'?'rgba(5,150,105,.1)':'rgba(245,158,11,.1)'" [style.color]="b.status==='confirmed'?'var(--clr-success)':'#d97706'">{{b.status}}</span>
        </div>
        <div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--clr-border);"><span style="font-size:.85rem;color:var(--clr-text-muted);">Travelers</span><strong>{{b.travelers}}</strong></div>
        <div class="d-flex justify-content-between py-2"><span style="font-size:.85rem;color:var(--clr-text-muted);">Total Price</span><strong style="color:var(--clr-primary);">{{b.totalPrice | number}} TND</strong></div>
      </div>
    </div>
  </div>
</div>
