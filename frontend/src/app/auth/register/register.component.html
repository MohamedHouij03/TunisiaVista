<div style="min-height:100vh;background:linear-gradient(135deg,var(--clr-navy) 0%,var(--clr-primary) 100%);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:500px;">
    <div class="text-center mb-4">
      <a routerLink="/" style="font-family:var(--font-heading);font-size:1.8rem;font-weight:700;color:white;text-decoration:none;">
        Tunisia<span style="color:var(--clr-secondary);">Vista</span>
      </a>
      <p style="color:rgba(255,255,255,.6);margin-top:.5rem;font-size:.875rem;">Create your account, it's free</p>
    </div>
    <div style="background:white;border-radius:var(--radius-xl);padding:2.5rem;box-shadow:var(--shadow-xl);">
      <div *ngIf="error" style="background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:var(--radius-md);color:var(--clr-danger);padding:.875rem;margin-bottom:1.5rem;font-size:.875rem;">
        <i class="bi bi-exclamation-circle me-2"></i>{{error}}
      </div>
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">First Name <span style="color:var(--clr-danger);">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="form.firstName" placeholder="Jane">
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" [(ngModel)]="form.lastName" placeholder="Smith">
        </div>
        <div class="col-12">
          <label class="form-label">Email <span style="color:var(--clr-danger);">*</span></label>
          <input type="email" class="form-control" [(ngModel)]="form.email" placeholder="jane@example.com">
        </div>
        <div class="col-12">
          <label class="form-label">Phone <span style="color:var(--clr-text-muted);font-weight:400;">(optional)</span></label>
          <input type="tel" class="form-control" [(ngModel)]="form.phone" placeholder="+1 234 567 8900">
        </div>
        <div class="col-6">
          <label class="form-label">Password <span style="color:var(--clr-danger);">*</span></label>
          <input type="password" class="form-control" [(ngModel)]="form.password" placeholder="Min 6 chars">
        </div>
        <div class="col-6">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" [(ngModel)]="form.confirmPassword" placeholder="Repeat">
        </div>
        <div class="col-12 mt-2">
          <button class="btn btn-primary w-100 btn-lg" (click)="submit()" [disabled]="loading">
            <span *ngIf="!loading"><i class="bi bi-person-plus me-2"></i>Create Account</span>
            <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Creating...</span>
          </button>
        </div>
      </div>
      <div class="text-center mt-4">
        <a routerLink="/" style="font-size:.82rem;color:var(--clr-text-muted);">← Back to site</a>
        <span style="font-size:.82rem;color:var(--clr-text-muted);"> · </span>
        <span style="font-size:.82rem;color:var(--clr-text-muted);">Already have an account? </span>
        <a routerLink="/login" style="font-size:.82rem;color:var(--clr-primary);text-decoration:none;font-weight:600;">Sign in</a>
      </div>
    </div>
  </div>
</div>
