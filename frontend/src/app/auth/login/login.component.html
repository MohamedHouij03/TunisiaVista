<div style="min-height:100vh;background:linear-gradient(135deg,var(--clr-navy) 0%,var(--clr-primary) 100%);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:440px;">
    <!-- Logo -->
    <div class="text-center mb-4">
      <a routerLink="/" style="font-family:var(--font-heading);font-size:1.8rem;font-weight:700;color:white;text-decoration:none;">
        Tunisia<span style="color:var(--clr-secondary);">Vista</span>
      </a>
      <p style="color:rgba(255,255,255,.6);margin-top:.5rem;font-size:.875rem;">Sign in to your account</p>
    </div>
    <!-- Card -->
    <div style="background:white;border-radius:var(--radius-xl);padding:2.5rem;box-shadow:var(--shadow-xl);">
      <div *ngIf="error" style="background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:var(--radius-md);color:var(--clr-danger);padding:.875rem;margin-bottom:1.5rem;font-size:.875rem;">
        <i class="bi bi-exclamation-circle me-2"></i>{{error}}
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" [(ngModel)]="email" placeholder="you@example.com" (keyup.enter)="submit()">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="position-relative">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="submit()">
          <button type="button" class="btn btn-sm position-absolute top-50 end-0 translate-middle-y me-2 border-0 bg-transparent text-muted" (click)="showPassword = !showPassword">
            <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </button>
        </div>
      </div>
      <button class="btn btn-primary w-100 btn-lg" (click)="submit()" [disabled]="loading">
        <span *ngIf="!loading"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
        <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
      </button>
      <div class="text-center mt-4">
        <a routerLink="/" style="font-size:.82rem;color:var(--clr-text-muted);">← Back to site</a>
        <span style="font-size:.82rem;color:var(--clr-text-muted);"> · </span>
        <a routerLink="/register" style="font-size:.82rem;color:var(--clr-primary);text-decoration:none;font-weight:600;">Create account</a>
      </div>
    </div>
  </div>
</div>
